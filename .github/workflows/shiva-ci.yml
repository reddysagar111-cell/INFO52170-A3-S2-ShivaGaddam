# GitHub Actions CI workflow for INFO 52170 Assessment 3
# Created by Shiva Gaddam

name: CI Pipeline - Shiva Gaddam

# This workflow runs automatically whenever code is pushed to any branch
on:
  push:

jobs:
  lint-and-test:
    # This job runs on GitHub's latest Ubuntu virtual machine
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository code
      # This allows GitHub Actions to access all files in the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Python
      # This installs Python 3.11 on the GitHub Actions runner
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3: Install dependencies
      # This upgrades pip and installs flake8 from requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run linting with flake8
      # flake8 checks the Python code for style and formatting issues
      - name: Run linting with flake8
        run: flake8 .

      # Step 5: Run unit tests
      # unittest runs the calculator test cases to confirm the functions work correctly
      - name: Run unit tests
        run: python -m unittest test_calculator.py -v